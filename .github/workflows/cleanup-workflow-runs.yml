name: Cleanup Workflow Runs

on:
  schedule:
    - cron: "15 19 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete workflow runs older than 7 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DAYS_TO_KEEP: "7"
        run: |
          python - <<'PY'
          import os
          import requests
          from datetime import datetime, timedelta, timezone

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          days_to_keep = int(os.environ.get("DAYS_TO_KEEP", "7"))

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          cutoff = datetime.now(timezone.utc) - timedelta(days=days_to_keep)

          runs = []
          page = 1

          while True:
              url = f"https://api.github.com/repos/{repo}/actions/runs?per_page=100&page={page}"
              resp = requests.get(url, headers=headers, timeout=30)
              resp.raise_for_status()
              data = resp.json()
              page_runs = data.get("workflow_runs", [])
              if not page_runs:
                  break
              runs.extend(page_runs)
              if len(page_runs) < 100:
                  break
              page += 1

          to_delete = []
          for run in runs:
              created_at = datetime.strptime(run["created_at"], "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)
              if created_at < cutoff:
                  to_delete.append(run)

          print(f"Total runs: {len(runs)}")
          print(f"Deleting runs older than {days_to_keep} days: {len(to_delete)}")

          for run in to_delete:
              run_id = run["id"]
              del_url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}"
              del_resp = requests.delete(del_url, headers=headers, timeout=30)
              if del_resp.status_code not in (204, 202):
                  print(f"Failed to delete run {run_id}: {del_resp.status_code} {del_resp.text}")
              else:
                  print(f"Deleted run {run_id}")
          PY
